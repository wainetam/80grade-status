# This file must live at .github/workflows/status-wall.yml in the status repo.
name: status-wall

on:
  schedule:
    - cron: "*/10 * * * *"   # every ~10 min, UTC. NOTE: GitHub cron is best-effort —
                              # it can lag 5-15 min on shared runners. The page shows its
                              # own "Updated <time>" so any staleness is visible.
  workflow_dispatch: {}       # manual "Run workflow" button
  push:
    branches: [main]          # rebuild when the renderer changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render the wall from the HC API
        env:
          HC_API_KEY: ${{ secrets.HC_API_KEY }}   # read-only key, set in repo secrets
        run: |
          mkdir -p _site
          python3 render_status_wall.py --fetch --output _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
